<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Netflix Simples</title>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial;
    }

    header {
      background: black;
      padding: 15px;
      color: red;
      font-size: 24px;
      font-weight: bold;
    }

    .banner {
      height: 200px;
      background: url("https://via.placeholder.com/800x200") center/cover;
      display: flex;
      align-items: center;
      padding: 20px;
    }

    .movies {
      padding: 20px;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .movie {
      width: 120px;
      height: 180px;
      background: gray;
    }
  </style>
</head>

<body>

<header>NETFLIX</header>

<div class="banner">
  <h2>Filme em destaque</h2>
</div>

<div class="movies">
  <h3>Populares</h3>

  <div class="row">
    <div class="movie"></div>
    <div class="movie"></div>
    <div class="movie"></div>
    <div class="movie"></div>
  </div>
</div>

</body>
</html>
